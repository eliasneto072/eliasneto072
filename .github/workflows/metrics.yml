name: Métricas do GitHub

on:
  # Atualiza todo dia às 03:00 UTC (00h no horário de Brasília)
  schedule:
    - cron: "0 3 * * *"
  # Permite rodar manualmente pelo botão "Run workflow" na aba Actions
  workflow_dispatch:
  # Roda também quando você editar este arquivo
  push:
    branches: [ "main" ]
    paths: [ ".github/workflows/metrics.yml" ]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # ---- Card 1: estatísticas gerais (commits, PRs, issues, estrelas) ----
      - name: Estatísticas gerais
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.svg
          user: eliasneto072
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Recife
          # Cores alinhadas ao portfólio (marinho + âmbar/teal)
          config_output: svg
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ---- Card 2: linguagens mais usadas ----
      - name: Linguagens
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-languages.svg
          user: eliasneto072
          template: classic
          base: ""
          config_timezone: America/Recife
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
